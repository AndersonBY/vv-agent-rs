name: Publish crate

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to publish, for example v0.1.1"
        required: true
        type: string
      source_ref:
        description: "Git ref to build from when manually dispatching"
        required: false
        default: "main"
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Publish vv-agent to crates.io
    runs-on: ubuntu-latest
    environment: crates-io
    env:
      VV_AGENT_RUN_LIVE_TESTS: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.source_ref || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check tag matches crate version
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "vv-agent") | .version')"
          tag="${RELEASE_TAG#v}"
          if [ "$version" != "$tag" ]; then
            echo "Tag $RELEASE_TAG does not match vv-agent version $version" >&2
            exit 1
          fi

      - name: Format check
        run: cargo fmt --check

      - name: Test
        run: cargo test -p vv-agent

      - name: Apalis backend test
        run: cargo test -p vv-agent --features apalis --test apalis_backend

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Package dry run
        run: cargo publish --manifest-path crates/vv-agent/Cargo.toml --dry-run

      - name: Publish
        run: cargo publish --manifest-path crates/vv-agent/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
